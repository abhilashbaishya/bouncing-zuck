<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bouncing Zuck — Pretext Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Inter+Display:wght@500;600&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --bg: #f9f0f6;
        --ink: #0c1425;
        --ink-muted: #42506c;
        --accent: #e8663d;
        --cyan: #a6ffff;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        height: 100%;
        background: #f0f0f0;
        color: var(--ink);
        overscroll-behavior: none;
      }

      body {
        font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
        cursor: default;
        overflow: hidden;
      }

      .page {
        display: flex;
        flex-direction: column;
        height: 100vh;
        max-width: 619px;
        margin: 0 auto;
        overflow: hidden;
        isolation: isolate;
        background: white;
        box-shadow: 0 0 40px rgba(12, 20, 37, 0.08);
        position: relative;
      }

      /* --- Stage: full content area --- */
      .stage {
        position: relative;
        flex: 1;
        overflow: hidden;
        background: white;
      }

      /* White background covers top portion, dynamically sized */
      .bg-top {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        background: white;
        z-index: 0;
      }

      /* Pink background covers bottom portion */
      .bg-bottom {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--bg);
        z-index: 0;
      }

      /* Divider SVG */
      .divider-line {
        position: absolute;
        left: 0;
        width: 100%;
        height: 8px;
        display: block;
        z-index: 1;
      }

      /* --- Bouncing portrait --- */
      .zuck-container {
        position: absolute;
        z-index: 3;
        user-select: none;
        pointer-events: auto;
        cursor: grab;
        filter: drop-shadow(0 8px 24px rgba(12, 20, 37, 0.12));
      }

      .zuck-container.dragging {
        cursor: grabbing;
      }

      .zuck-img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
      }

      /* --- Text lines --- */
      .line {
        position: absolute;
        white-space: pre;
        user-select: text;
        cursor: text;
        z-index: 1;
      }

      .quote-mark {
        position: absolute;
        color: var(--accent);
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 700;
        z-index: 1;
        user-select: none;
        pointer-events: none;
        line-height: 1;
      }

      .footer {
        height: 67px;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 48px;
        font: 400 10px/14px "Inter", sans-serif;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #8f95a3;
        z-index: 1;
        background: white;
      }

      .footer-center {
        color: #8192b2;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div id="stage" class="stage">
        <div id="bg-top" class="bg-top"></div>
        <div id="bg-bottom" class="bg-bottom"></div>
        <img id="divider-line" class="divider-line" src="./assets/divider.svg" alt="" />
      </div>
      <div class="footer">
        <span>privado.ai</span>
        <span class="footer-center">Move Fast &amp; Don't Break Things</span>
        <span>08</span>
      </div>
    </main>

    <script type="module" src="./bouncing-zuck.ts"></script>
  </body>
</html>
