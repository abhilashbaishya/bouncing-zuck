<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Privacy Engineering Gap</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@600&family=Hedvig+Letters+Serif:opsz@12..24&display=swap" rel="stylesheet" />
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --bg: #f9f0f6;
        --ink: #1b1d22;
        --ink-muted: #606776;
        --ink-secondary: #363a45;
        --accent: #e8663d;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: #e8e5e0;
        color: var(--ink);
        overscroll-behavior: none;
        overflow: hidden;
      }

      body {
        font-family: "Geist", sans-serif;
        cursor: default;
        touch-action: none;
      }

      .page {
        display: flex;
        flex-direction: column;
        height: 100dvh;
        max-width: 595px;
        width: 100%;
        margin: 0 auto;
        overflow: hidden;
        isolation: isolate;
        background: white;
        box-shadow: 0 0 40px rgba(12, 20, 37, 0.1);
        position: relative;
      }

      /* --- Stage: full content area --- */
      .stage {
        position: relative;
        flex: 1;
        overflow: hidden;
        background: white;
      }

      /* White background covers top portion */
      .bg-top {
        position: absolute;
        left: 0;
        right: 0;
        top: 0;
        background: white;
        z-index: 0;
      }

      /* Pink background covers bottom portion */
      .bg-bottom {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        background: var(--bg);
        z-index: 0;
      }

      /* Divider SVG */
      .divider-line {
        position: absolute;
        left: 0;
        right: 0;
        height: 8px;
        z-index: 1;
      }

      /* --- Bouncing portrait --- */
      .zuck-container {
        position: absolute;
        z-index: 3;
        user-select: none;
        pointer-events: auto;
        cursor: grab;
      }

      .zuck-container.dragging {
        cursor: grabbing;
      }

      .zuck-img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
        filter: none;
      }

      /* --- Text lines --- */
      .line {
        position: absolute;
        white-space: pre;
        user-select: text;
        cursor: text;
        z-index: 1;
      }

      .quote-mark {
        position: absolute;
        width: 22px;
        height: 16px;
        display: block;
        z-index: 1;
        user-select: none;
        pointer-events: none;
      }

      .quote-mark img {
        width: 22px;
        height: 16px;
        display: block;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div id="stage" class="stage">
        <div id="bg-top" class="bg-top"></div>
        <div id="bg-bottom" class="bg-bottom"></div>
        <div id="divider-line" class="divider-line"></div>
      </div>
    </main>

    <script type="module" src="./bouncing-zuck.ts"></script>
  </body>
</html>
