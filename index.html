<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bouncing Zuck — Pretext Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --bg: #f9f0f6;
        --ink: #0c1425;
        --ink-muted: #42506c;
        --accent: #e8663d;
        --cyan: #a6ffff;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        height: 100%;
        background: var(--bg);
        color: var(--ink);
        overscroll-behavior: none;
      }

      body {
        font-family: "DM Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
        cursor: default;
        overflow: hidden;
      }

      .page {
        position: relative;
        height: 100vh;
        overflow: hidden;
        isolation: isolate;
      }

      .hint-pill {
        position: fixed;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        margin: 0;
        padding: 10px 16px 11px;
        border-radius: 999px;
        background: rgba(12, 20, 37, 0.92);
        color: rgba(249, 240, 246, 0.96);
        font: 500 12px/1.2 "DM Sans", sans-serif;
        letter-spacing: 0.015em;
        white-space: nowrap;
        user-select: none;
        pointer-events: none;
        z-index: 5;
        box-shadow: 0 14px 32px rgba(12, 20, 37, 0.16);
      }

      .stage {
        position: relative;
        height: 100%;
      }

      /* --- Bouncing portrait --- */
      .zuck-container {
        position: absolute;
        z-index: 3;
        user-select: none;
        pointer-events: none;
        filter: drop-shadow(0 8px 24px rgba(12, 20, 37, 0.12));
      }

      .zuck-outline {
        position: absolute;
        inset: 8% 5% 0 2%;
      }

      .zuck-outline img {
        width: 100%;
        height: 100%;
        display: block;
      }

      .zuck-face {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }

      .zuck-face img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
        mix-blend-mode: multiply;
      }

      .zuck-eye {
        position: absolute;
        width: 22px;
        height: 22px;
        left: 15%;
        top: 37%;
      }

      .zuck-eye img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
      }

      /* --- Text lines --- */
      .line {
        position: absolute;
        white-space: pre;
        color: var(--ink);
        font-weight: 400;
        user-select: text;
        cursor: text;
        z-index: 1;
      }

      .headline {
        position: absolute;
        margin: 0;
        font: inherit;
        user-select: text;
        z-index: 1;
      }

      .headline-line {
        position: absolute;
        white-space: pre;
        color: var(--ink);
        cursor: text;
      }

      .quote-mark {
        position: absolute;
        color: var(--accent);
        font-family: Georgia, "Times New Roman", serif;
        font-weight: 700;
        z-index: 1;
        user-select: none;
        pointer-events: none;
        line-height: 1;
      }

      .section-num {
        position: absolute;
        font-family: "DM Sans", sans-serif;
        font-weight: 400;
        color: var(--ink);
        z-index: 1;
        line-height: 1;
      }

      .footer {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 48px;
        font: 400 10px/14px "DM Sans", sans-serif;
        letter-spacing: 1px;
        text-transform: uppercase;
        color: #8f95a3;
        z-index: 1;
        background: white;
      }

      .footer-center {
        color: #8192b2;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main class="page">
      <p class="hint-pill">Zuckerberg bounces like a DVD logo. Text reflows around him in real time.</p>
      <div id="stage" class="stage"></div>
      <div class="footer">
        <span>privado.ai</span>
        <span class="footer-center">Move Fast &amp; Don't Break Things</span>
        <span>08</span>
      </div>
    </main>

    <script type="module" src="./bouncing-zuck.ts"></script>
  </body>
</html>
